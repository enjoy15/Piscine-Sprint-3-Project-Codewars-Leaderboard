<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codewars Leaderboard</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .input-section {
      margin-bottom: 20px;
    }

    .input-hint {
      margin-top: 4px;
      color: #444;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 4px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #003d99;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    select {
      padding: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      border: 2px solid #ddd;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #f8f9fa;
      font-weight: bold;
    }

    .top-user {
      background-color: gold;
      font-weight: bold;
    }

    .error {
      color: red;
      padding: 10px;
      background-color: #ffe6e6;
      border-radius: 4px;
      margin: 10px 0;
      border: 1px solid #d88;
    }

    .loading {
      color: #007bff;
      font-style: italic;
      padding: 10px 0;
    }

    .hidden {
      display: none;
    }
  </style>
</head> 
<body>
  <main>
    <h1>Codewars Leaderboard</h1>

    <div class="input-section">
      <label for="usernames">Enter Codewars usernames (comma-separated):</label>
      <input
        type="text"
        id="usernames"
        placeholder="e.g. CodeYourFuture,SallyMcGrath,40thieves"
        aria-describedby="inputHint"
      >
      <p id="inputHint" class="input-hint">Use commas between usernames, for example: CodeYourFuture,SallyMcGrath,40thieves</p>
      <button id="fetchButton" type="button">Fetch Leaderboard</button>
    </div>

    <div id="message" class="hidden" role="status" aria-live="polite" aria-atomic="true"></div>

    <div id="languageSection" class="hidden">
      <label for="languageSelect">Select language ranking:</label>
      <select id="languageSelect" aria-label="Select language ranking">
        <option value="overall">Overall</option>
      </select>
    </div>

    <table id="leaderboardTable" class="hidden">
      <caption>Codewars ranking results</caption>
      <thead>
        <tr>
          <th scope="col">Username</th>
          <th scope="col">Clan</th>
          <th scope="col">Score</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>

  <script src="index.mjs" type="module"></script>
</body>
</html>
